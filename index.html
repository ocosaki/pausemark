<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PauseMark — Timing is Everything</title>
  <meta name="description" content="PauseMark is a focus game where timing matters as much as knowledge. Can you wait long enough?"/>
  <meta property="og:title" content="PauseMark — Timing is Everything"/>
  <meta property="og:description" content="Not just a quiz. The right answer at the wrong moment is worth nothing."/>
  <meta property="og:url" content="https://pausemark.orucupoxygen.com"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c; --gold-light: #e8c870; --gold-dark: #8a6a20;
      --ink: #111010; --ink-2: #1a1512; --ink-3: #2a2520; --ink-4: #3a3530;
      --cream: #f5f0e8; --cream-2: #f0ebe0; --cream-3: #ece7dc;
      --muted: #8a7f72; --muted-2: #6b6258; --muted-3: #4a4540;
      --text-light: #c8bfb0;
      --green: #1d9e60; --green-bg: #edfaf3;
      --red: #c0392b; --red-bg: #fdf0ee;
      --amber: #c07820; --amber-bg: #fdf6ee;
    }
    html, body { min-height: 100vh; background: var(--ink); font-family: 'DM Sans', sans-serif; color: var(--cream); }
    #app { max-width: 960px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: var(--ink); }

    /* LOGO STRIP */
    .logo-strip { background: var(--ink); border-bottom: 1px solid var(--ink-3); padding: 1rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .logo-link { display: flex; align-items: center; text-decoration: none; flex-shrink: 0; }
    .logo-img { height: auto; width: 220px; object-fit: contain; display: block; }
    .logo-fallback { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--gold); letter-spacing: 0.05em; }
    .strip-right { display: flex; align-items: center; gap: 1rem; }
    .btn-all-games {
      background: linear-gradient(135deg, #c9a84c, #e8c870, #c9a84c);
      border: none;
      border-radius: 8px;
      color: var(--ink-2);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 9px 18px;
      cursor: pointer;
      white-space: nowrap;
      letter-spacing: 0.04em;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 12px rgba(201,168,76,0.4);
      transition: all 0.2s;
    }
    .btn-all-games:hover { background: linear-gradient(135deg, #e8c870, #c9a84c, #e8c870); box-shadow: 0 4px 18px rgba(201,168,76,0.6); transform: translateY(-1px); }

    /* LOBBY */
    .lobby { padding: 2rem; flex: 1; }
    .lobby-intro { margin-bottom: 2rem; }
    .lobby-title { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--text-light); line-height: 1.9; font-style: italic; margin-bottom: 0.5rem; }
    .lobby-title strong { font-style: normal; color: var(--gold); }
    .lobby-subtitle { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 1.5rem; }
    .lobby-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }
    .lobby-card { background: var(--ink-2); border: 1px solid var(--ink-3); border-radius: 12px; padding: 1.25rem; cursor: pointer; transition: all 0.2s; text-decoration: none; display: flex; flex-direction: column; }
    .lobby-card:hover { border-color: var(--gold); background: #1e1a10; transform: translateY(-2px); }
    .lobby-card-num { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 0.4rem; }
    .lobby-card-name { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--cream); margin-bottom: 0.3rem; }
    .lobby-card-label { font-size: 12px; color: var(--muted); line-height: 1.5; margin-bottom: 1rem; flex: 1; }
    .lobby-card-play { display: inline-block; font-size: 12px; color: var(--gold); font-weight: 600; letter-spacing: 0.05em; }

    /* MAIN LAYOUT */
    .main-layout { display: grid; grid-template-columns: 1fr 240px; flex: 1; }
    .game-panel { padding: 2rem; background: var(--cream); color: var(--ink-2); overflow-y: auto; min-height: 600px; }
    .lb-panel { background: #0d0c0a; padding: 1.5rem 1.25rem; border-left: 1px solid var(--ink-3); overflow-y: auto; }
    .lb-title { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 0.2rem; }
    .lb-date { font-size: 10px; color: var(--muted-3); margin-bottom: 1.25rem; letter-spacing: 0.03em; }
    .lb-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid var(--ink-3); font-size: 12px; }
    .lb-row:last-child { border-bottom: none; }
    .lb-rank { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted-3); width: 18px; text-align: right; flex-shrink: 0; }
    .lb-rank.gold { color: var(--gold); } .lb-rank.silver { color: #8a9aaa; } .lb-rank.bronze { color: #a07050; }
    .lb-name { flex: 1; color: var(--text-light); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-score { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--gold); flex-shrink: 0; }
    .lb-row.hl { background: #1e1a10; border-radius: 6px; padding: 7px 6px; margin: 0 -6px; }
    .lb-row.hl .lb-name { color: var(--cream); }
    .lb-empty { font-size: 12px; color: var(--muted-3); text-align: center; padding: 2rem 0; line-height: 1.9; }

    /* RULES */
    .rules-card { background: var(--ink-2); border-radius: 12px; padding: 1.75rem; margin-bottom: 2rem; border-left: 3px solid var(--gold); }
    .rules-philosophy { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--cream); line-height: 1.9; margin-bottom: 1.5rem; font-style: italic; }
    .rules-philosophy strong { font-style: normal; color: var(--gold); }
    .rules-mechanics { font-size: 13px; color: var(--text-light); line-height: 1.9; margin-bottom: 1.5rem; }
    .rules-mechanics strong { color: var(--cream); }
    .rules-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .rules-table th { text-align: left; color: var(--muted-2); font-weight: 500; padding: 6px 10px; border-bottom: 1px solid var(--ink-3); font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }
    .rules-table td { padding: 7px 10px; color: var(--text-light); border-bottom: 1px solid #1e1c18; }
    .rules-table tr:last-child td { border-bottom: none; }
    .pts-green { font-family: 'DM Mono', monospace; color: var(--green); font-weight: 700; font-size: 13px; }
    .pts-zero  { font-family: 'DM Mono', monospace; color: var(--muted-2); }
    .pts-neg   { font-family: 'DM Mono', monospace; color: var(--amber); font-weight: 600; }

    /* GAME NICK */
    .game-heading { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--ink-2); margin-bottom: 0.4rem; }
    .game-label { font-size: 15px; color: var(--ink-2); font-weight: 500; margin-bottom: 1.75rem; line-height: 1.5; border-left: 3px solid var(--gold); padding-left: 0.75rem; }
    .back-link { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); text-decoration: none; margin-bottom: 1.25rem; cursor: pointer; background: none; border: none; padding: 0; transition: color 0.15s; }
    .back-link:hover { color: var(--gold); }
    .field-label { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; }
    .nick-row { display: flex; gap: 10px; align-items: stretch; }
    .nick-input { background: #fff; border: 1.5px solid #ccc; border-radius: 8px; color: var(--ink-2); font-family: 'DM Sans', sans-serif; font-size: 15px; padding: 11px 14px; flex: 1; outline: none; transition: border-color 0.15s; }
    .nick-input:focus { border-color: var(--gold); }
    .nick-input::placeholder { color: #bbb; }
    .btn-play { background: var(--gold); border: none; border-radius: 8px; color: var(--ink-2); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 700; padding: 11px 30px; cursor: pointer; transition: background 0.15s; white-space: nowrap; letter-spacing: 0.02em; }
    .btn-play:hover { background: var(--gold-light); }
    .btn-ghost { background: #fff; border: 1.5px solid #ccc; border-radius: 8px; color: #555; font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 10px 24px; cursor: pointer; transition: all 0.15s; display: block; margin: 0 auto; }
    .btn-ghost:hover { border-color: var(--gold); color: var(--gold-dark); }

    /* PLAY */
    .score-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .score-total { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); }
    .score-total strong { font-size: 22px; color: var(--ink-2); margin-right: 2px; }
    .round-flash { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 500; min-width: 50px; text-align: right; transition: opacity 0.4s; }
    .progress-line { display: flex; gap: 6px; margin-bottom: 1.25rem; }
    .pip { width: 8px; height: 8px; border-radius: 50%; background: #d5cfc5; border: 1px solid #bbb; transition: background 0.2s; }
    .pip.active { background: var(--muted); border-color: var(--muted); }
    .pip.ok     { background: var(--green); border-color: var(--green); }
    .pip.bad    { background: var(--red);   border-color: var(--red); }
    .pip.ep     { background: var(--amber); border-color: var(--amber); }
    .goal-line { font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold-dark); margin-bottom: 1.25rem; font-weight: 600; }
    .title-wrap { background: var(--ink-2); border-radius: 10px; padding: 1.25rem 1rem; margin-bottom: 0.5rem; }
    .title-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 0.6rem; }
    .title-text { font-family: 'DM Mono', monospace; font-size: 26px; font-weight: 500; color: var(--cream); letter-spacing: 3px; text-align: center; min-height: 40px; display: flex; align-items: center; justify-content: center; }
    .cur { display: inline-block; width: 2px; height: 26px; background: var(--gold); margin-left: 3px; vertical-align: middle; animation: blink 0.8s step-end infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .trap-hint { font-size: 11px; color: #aaa; text-align: center; min-height: 18px; margin: 0.5rem 0 0.75rem; letter-spacing: 0.03em; }
    .wait-inst { text-align: center; font-size: 13px; color: var(--muted); margin-bottom: 1rem; opacity: 0; transition: opacity 0.3s; }
    .wait-num { font-family: 'DM Mono', monospace; font-size: 24px; font-weight: 500; color: var(--ink-2); margin: 0 4px; }
    .answer-label { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-2); font-weight: 700; text-align: center; margin-bottom: 0.75rem; }
    .dot-zone { height: 28px; display: flex; align-items: center; justify-content: center; margin-bottom: 1rem; }
    .dot { width: 14px; height: 14px; border-radius: 50%; background: #bbb; }
    @keyframes pulse { 0%,100%{opacity:0.25;transform:scale(1)} 50%{opacity:1;transform:scale(1.4)} }
    @keyframes secondbeat { 0%{opacity:1;transform:scale(1.5);background:#c9a84c} 20%{opacity:1;transform:scale(1.5);background:#c9a84c} 21%{opacity:0.2;transform:scale(1);background:#bbb} 100%{opacity:0.2;transform:scale(1);background:#bbb} }
    .choices { display: flex; gap: 12px; justify-content: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
    .choice-btn { min-width: 148px; padding: 14px 20px; background: #fff; border: 1.5px solid #c8c0b0; border-radius: 8px; color: var(--ink-2); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; text-align: center; box-shadow: 0 1px 4px rgba(0,0,0,0.07); white-space: pre-line; line-height: 1.8; }
    .choice-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--gold-dark); background: #fffdf5; }
    .choice-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .choice-btn.correct { border-color: var(--green); background: var(--green-bg); color: var(--green); }
    .choice-btn.wrong   { border-color: var(--red);   background: var(--red-bg);   color: var(--red); }
    .choice-btn.early   { border-color: var(--amber); background: var(--amber-bg); color: var(--amber); animation: shake 0.3s ease; }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    .feedback { text-align: center; font-size: 13px; min-height: 40px; line-height: 1.7; color: var(--muted); }
    .feedback.good { color: var(--green); } .feedback.bad { color: var(--red); } .feedback.et { color: var(--amber); }

    /* RESULT */
    .result-big { font-family: 'Playfair Display', serif; font-size: 72px; font-weight: 700; color: var(--ink-2); line-height: 1; text-align: center; margin-bottom: 0.25rem; }
    .result-sub { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 1rem; }
    .result-rank-num { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--gold-dark); text-align: center; margin-bottom: 1rem; }
    .result-msg-card { background: var(--ink-2); border-radius: 10px; padding: 1.5rem; margin-bottom: 1.5rem; border-left: 3px solid var(--gold); }
    .result-msg-text { font-size: 13px; color: var(--text-light); line-height: 1.9; margin-bottom: 1rem; }
    .result-msg-link { display: inline-block; font-size: 12px; color: var(--gold); font-weight: 500; letter-spacing: 0.04em; text-decoration: none; border-bottom: 1px solid var(--gold-dark); padding-bottom: 1px; }
    .result-msg-link:hover { color: var(--gold-light); border-color: var(--gold-light); }

    /* OTHER GAMES */
    .other-games { margin-bottom: 1.5rem; }
    .other-games-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.75rem; font-weight: 600; }
    .other-games-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .other-game-card { background: var(--ink-2); border: 1px solid var(--ink-3); border-radius: 8px; padding: 0.75rem 1rem; text-decoration: none; transition: all 0.15s; display: block; }
    .other-game-card:hover { border-color: var(--gold); background: #1e1a10; }
    .other-game-card-name { font-size: 13px; color: var(--cream); font-weight: 500; margin-bottom: 0.2rem; }
    .other-game-card-label { font-size: 11px; color: var(--muted-2); }

    /* RESULTS TABLE */
    .res-table { border: 1.5px solid #d5cfc5; border-radius: 8px; overflow: hidden; margin-bottom: 1.5rem; background: #fff; }
    .res-table table { width: 100%; border-collapse: collapse; }
    .res-table th { text-align: left; font-size: 11px; color: var(--muted); padding: 7px 10px; font-weight: 500; background: var(--cream-2); border-bottom: 1px solid #d5cfc5; letter-spacing: 0.04em; }
    .res-table td { font-size: 12px; padding: 7px 10px; border-bottom: 1px solid var(--cream-3); color: #3a3530; }
    .res-table tr:last-child td { border-bottom: none; }

    /* WHATSAPP */
    .share-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: #25D366; border: none; border-radius: 8px; color: #fff; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; padding: 13px 24px; cursor: pointer; width: 100%; margin-bottom: 1rem; text-decoration: none; transition: background 0.15s; letter-spacing: 0.02em; }
    .share-btn:hover { background: #1fba58; }
    .share-btn svg { flex-shrink: 0; }

    /* APP BUTTONS */
    .app-section { margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--ink-3); }
    .app-section-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-3); margin-bottom: 0.75rem; }
    .app-btn { display: flex; align-items: center; gap: 10px; background: #1a1a16; border: 1px solid var(--ink-4); border-radius: 8px; padding: 10px 12px; text-decoration: none; transition: all 0.15s; margin-bottom: 8px; }
    .app-btn:hover { border-color: var(--gold); background: #1e1a10; }
    .app-btn-icon { font-size: 20px; flex-shrink: 0; }
    .app-btn-text { flex: 1; }
    .app-btn-sub { font-size: 9px; color: var(--muted-3); letter-spacing: 0.06em; text-transform: uppercase; display: block; margin-bottom: 1px; }
    .app-btn-name { font-size: 13px; color: var(--cream); font-weight: 500; display: block; }
    .oco-link { display: block; margin-top: 1.25rem; text-align: center; font-size: 11px; color: var(--muted-2); text-decoration: none; letter-spacing: 0.04em; transition: color 0.15s; padding-top: 1rem; border-top: 1px solid var(--ink-3); }
    .oco-link:hover { color: var(--gold); }
    .oco-link span { color: var(--gold); }

    /* FOOTER */
    .page-footer { background: var(--ink); border-top: 1px solid var(--ink-3); padding: 1.25rem 2rem; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .footer-oco { font-size: 12px; color: var(--muted-2); text-decoration: none; transition: color 0.15s; letter-spacing: 0.03em; }
    .footer-oco:hover { color: var(--gold); }
    .footer-oco strong { color: var(--gold); font-weight: 500; }
    .footer-copy { font-size: 11px; color: var(--muted-3); }

    @media (max-width: 640px) {
      .main-layout { grid-template-columns: 1fr; }
      .lb-panel { border-left: none; border-top: 1px solid var(--ink-3); }
      .logo-strip { padding: 0.75rem 1rem; }
      .logo-img { width: 160px; }
      .game-panel { padding: 1.25rem; }
      .title-text { font-size: 20px; }
      .result-big { font-size: 54px; }
      .page-footer { flex-direction: column; gap: 0.5rem; text-align: center; }
      .nick-row { flex-direction: column; }
      .btn-play { width: 100%; text-align: center; }
      .lobby-grid { grid-template-columns: 1fr; }
      .other-games-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="app">
  <div class="logo-strip">
    <a href="https://orucupoxygen.com" target="_blank" class="logo-link">
      <img class="logo-img"
        src="https://cdn.jsdelivr.net/gh/ocosaki/pausemark@main/pausemarklogo.jpg?v=2"
        alt="PauseMark"
        onerror="this.style.display='none';document.getElementById('lf').style.display='block'"/>
      <span id="lf" style="display:none" class="logo-fallback">PauseMark</span>

    <div class="strip-right">
      <button class="btn-all-games" id="btn-lobby">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M3 3h8v8H3zm0 10h8v8H3zm10-10h8v8h-8zm0 10h8v8h-8z"/></svg>
        All Games
      </button>
    </div>
  </div>

  <div id="main-content"></div>

  <div class="page-footer">
    <a class="footer-oco" href="https://orucupoxygen.com" target="_blank">A game by <strong>Oru Cup Oxygen</strong></a>
    <span class="footer-copy">pausemark.orucupoxygen.com</span>
  </div>
</div>

<script>
const GAMES = [
  {
    id: 'game-001', name: 'Identify the Lead Actor', letterMs: 300,
    label: 'Tamil Cinema — Choose the right lead (Hero/Heroine) of the movies',
    goal: 'Find the correct Lead of the movie', answerLabel: 'WHO IS THE LEAD?',
    films: [
      { film:"Pandiya Naadu",       correct:"Vishal",           wrong:"Rajinikanth",      trap:"Pandiyan" },
      { film:"OK Kanmani",          correct:"Dulquer Salmaan",  wrong:"Udhayanidhi",      trap:"Oru Kal Oru Kannadi" },
      { film:"Vettaikkaran",        correct:"Vijay",            wrong:"Rajinikanth",      trap:"Vettaiyan" },
      { film:"Romeo Juliet",        correct:"Jayam Ravi",       wrong:"Vijay Antony",     trap:"Romeo" },
      { film:"Kana Kandaen",        correct:"Gopika",           wrong:"Aishwarya Rajesh", trap:"Kanaa" },
      { film:"Mr. Madras",          correct:"Prabhu",           wrong:"Karthi",           trap:"Madras" },
      { film:"Dhillukku Dhuddu",    correct:"Santhanam",        wrong:"Vikram",           trap:"Dhil" },
      { film:"Endrendrum Punnagai", correct:"Jiiva",            wrong:"Vijay",            trap:"Endrendrum Kaadhal" },
      { film:"Unnai Ninaithu",      correct:"Suriya",           wrong:"Ajith",            trap:"Unnai Thedi" },
      { film:"Sethupathi IPS",      correct:"Vijayakanth",      wrong:"Vijay Sethupathi", trap:"Sethupathi" },
    ]
  },
  {
    id: 'game-002', name: 'Identify the Music Director', letterMs: 300,
    label: 'Tamil Cinema — Name the Music Director of the movie',
    goal: 'Find the correct Music Director of the movie', answerLabel: 'WHO IS THE MUSIC DIRECTOR?',
    films: [
      { film:"Rajapattai",       correct:"Yuvan Shankar Raja", wrong:"Ilaiyaraaja",        trap:"Sounds Ilaiyaraaja-era" },
      { film:"Kadhal Koattai",   correct:"Deva",               wrong:"A.R. Rahman",        trap:"Kadhal films often AR Rahman" },
      { film:"Naan",             correct:"Vijay Antony",       wrong:"Ilaiyaraaja",        trap:"Naan sounds classic era" },
      { film:"Thiruda Thirudi",  correct:"Dhina",              wrong:"A.R. Rahman",        trap:"Thiruda Thiruda was AR Rahman" },
      { film:"3 Roses",          correct:"Karthik Raja",       wrong:"Anirudh",            trap:"3 sounds new-gen Anirudh" },

function todayLabel(){return new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function todayDate(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function ssh(arr,seed){let a=[...arr],s=seed;for(let i=a.length-1;i>0;i--){s=(s*1664525+1013904223)&0xffffffff;const j=Math.abs(s)%(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildDeck(g){
  const seed=g.id.split('').reduce((s,c)=>s+c.charCodeAt(0),0);
  const sw=ssh([...WAITS],seed);
  return ssh(g.films,seed).map((f,i)=>({
    ...f,
    wait: f.wait !== undefined ? f.wait : sw[i]*1000
  }));
}
function calcPts(correct,early,delta){if(!correct||early)return 0;if(delta<=0)return 10;return Math.max(0,10-Math.floor(delta));}

async function sbFetch(path,opts){
  const res=await fetch(SUPABASE_URL+path,{...opts,headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json','Prefer':opts&&opts.prefer?opts.prefer:'',...(opts&&opts.headers?opts.headers:{})}});
  if(!res.ok)return null;
  try{return await res.json();}catch(e){return[];}
}
async function getScores(gameId){try{const d=await sbFetch(`/rest/v1/scores?game_id=eq.${encodeURIComponent(gameId)}&play_date=eq.${todayDate()}&order=score.desc&limit=50`);return d||[];}catch(e){return[];}}
async function getAllTimeScores(gameId){
  try{
    // Get top scores but deduplicate by nick — keep highest score per nick
    const d=await sbFetch(`/rest/v1/scores?game_id=eq.${encodeURIComponent(gameId)}&order=score.desc&limit=50`);
    if(!d||!d.length)return[];
    const seen=new Set();
    const deduped=d.filter(s=>{if(seen.has(s.nick))return false;seen.add(s.nick);return true;});
    return deduped.slice(0,5);
  }catch(e){return[];}
}
async function saveScore(gameId,nick,score){
  try{
    const existing=await sbFetch(`/rest/v1/scores?game_id=eq.${encodeURIComponent(gameId)}&play_date=eq.${todayDate()}&nick=eq.${encodeURIComponent(nick)}&limit=1`);
    if(existing&&existing.length>0){
      if(score>existing[0].score){
        await sbFetch(`/rest/v1/scores?id=eq.${existing[0].id}`,{
          method:'PATCH',
          headers:{'Prefer':'return=minimal'},
          body:JSON.stringify({score,ts:Date.now()})
        });
      }
    } else {
      await sbFetch('/rest/v1/scores',{
        method:'POST',
        headers:{'Prefer':'return=minimal'},
        body:JSON.stringify({game_id:gameId,nick,score,play_date:todayDate(),ts:Date.now()})
      });
    }
    return await getScores(gameId);
  }catch(e){return[];}
}
async function trackEvent(gameId,eventType){try{await sbFetch('/rest/v1/analytics',{method:'POST',prefer:'return=minimal',body:JSON.stringify({game_id:gameId,event:eventType,play_date:todayDate(),ts:Date.now()})});}catch(e){}}

}

    try{

      }
    }catch(e){}

  };

    renderPlay();
    window.scrollTo({top:0,left:0,behavior:'instant'});document.documentElement.scrollTop=0;document.body.scrollTop=0;
  };

function startCountdown(q){
  const wi=document.getElementById('wi');if(wi)wi.style.opacity='1';
  const sc=document.getElementById('sc');
  if(sc){sc.style.opacity='1';setTimeout(()=>{if(sc)sc.style.opacity='0';},3000);}
  const cw=document.getElementById('cw');
  if(cw){
    // Use double rAF to ensure DOM has fully painted before fading in buttons
    // This fixes iOS Safari rendering the previous button highlight state
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        cw.style.opacity='1';
        setTimeout(()=>{
          document.querySelectorAll('.choice-btn').forEach(b=>b.style.transition='');
        },50);
      });
    });
  }
  const dot=document.getElementById('dot');
  S.t0=performance.now();
  if(dot){
    dot.style.opacity='1';dot.style.animation='none';dot.style.background='#bbb';dot.style.transform='scale(1)';
    let dotCount=0;
    S.dotTimer=setInterval(()=>{
      const d=document.getElementById('dot');if(!d){clearInterval(S.dotTimer);return;}
      dotCount++;
      d.style.background='#c9a84c';d.style.transform='scale(1.5)';
      setTimeout(()=>{const d2=document.getElementById('dot');if(d2){d2.style.background='#bbb';d2.style.transform='scale(1)';}},200);
      if(dotCount>=3){clearInterval(S.dotTimer);S.dotTimer=null;setTimeout(()=>{const d3=document.getElementById('dot');if(d3)d3.style.opacity='0';},300);}
    },1000);
  }
}

function renderPlay(){
  const g=GAMES[S.gi],q=S.deck[S.cur];
  const isAudio=g.type==='audio';
  const isInstant=!isAudio&&g.letterMs===0;
  let pips='';
  for(let i=0;i<10;i++){const r=S.res[i];let c='pip';if(i<S.cur)c+=r.early?' ep':r.right?' ok':' bad';else if(i===S.cur)c+=' active';pips+=`<div class="${c}" id="p${i}"></div>`;}
  const opts=ssh([q.correct,q.wrong],q.correct.charCodeAt(0)+S.cur*13);
  const choicesStyle=q.song?'display:flex;flex-direction:column;gap:12px;margin-bottom:1.25rem':'display:flex;gap:12px;justify-content:center;margin-bottom:1.25rem;flex-wrap:wrap';
  const songMeta=q.song?`<div style="font-size:11px;color:var(--gold);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:0.4rem">${q.song} &nbsp;·&nbsp; ${q.movie}</div>`:'';

  const titleBlock = isAudio ? `
    <div class="title-wrap" style="text-align:center">
      <div class="title-label">${g.name}</div>
      <div style="font-size:36px;margin:0.5rem 0">🎵</div>
      <div id="audio-status" style="font-size:13px;color:var(--gold);letter-spacing:0.06em;font-weight:600;margin-bottom:0.5rem">Loading audio...</div>
      <div style="font-size:12px;color:var(--text-light);line-height:1.8">
        Listen to the BGM — then wait <strong style="color:var(--gold)">${Math.round(q.wait/1000)} seconds</strong> before answering
      </div>
      <audio id="bgm-player" preload="auto" src="https://cdn.jsdelivr.net/gh/ocosaki/pausemark@main/audio/${q.film}"></audio>
    </div>` : isInstant ? `
    <div class="title-wrap">
      <div class="title-label">${g.name}</div>
      ${songMeta}
      <div style="font-family:'DM Sans',sans-serif;font-size:17px;color:var(--cream);line-height:1.9;text-align:center;white-space:pre-line;padding:0.5rem 0" id="rt">${q.film}</div>
    </div>` : `
    <div class="title-wrap"><div class="title-label">${g.name}</div><div class="title-text"><span id="rt"></span><span class="cur" id="cb"></span></div></div>`;

  document.getElementById('gp').innerHTML=`
    <div class="score-row"><div class="score-total"><strong id="sv">${S.total}</strong> pts</div><div class="round-flash" id="rf" style="opacity:0"></div></div>
    <div class="progress-line">${pips}</div>
    <div class="goal-line">Goal : ${g.goal}</div>
    ${titleBlock}
    <div class="trap-hint" id="th"></div>
    <div class="wait-inst" id="wi">Wait <span class="wait-num">${Math.round(q.wait/1000)}</span> seconds</div>
    <div style="text-align:center;font-size:14px;color:#fff;font-weight:700;letter-spacing:0.12em;min-height:24px;margin-bottom:0.75rem;opacity:0;transition:opacity 0.5s;background:var(--gold);padding:6px 16px;border-radius:20px;display:inline-block;width:auto;margin-left:auto;margin-right:auto;" id="sc">⏱ NOW — START COUNTING</div>
    <div class="answer-label">${g.answerLabel}</div>
    <div class="dot-zone"><div class="dot" id="dot" style="opacity:0;animation:none"></div></div>
    <div id="cw" style="${choicesStyle};opacity:0;transition:opacity 0.4s">${opts.map(n=>`<button class="choice-btn" data-n="${n}" style="transition:none;background:#fff;border-color:#c8c0b0;color:var(--ink-2)">${n}</button>`).join('')}</div>
    <div class="feedback" id="fb"></div>`;
  document.querySelectorAll('.choice-btn').forEach(b=>{
    b.addEventListener('click',()=>onTap(b.dataset.n,b));
    // Force style flush to prevent mobile browser caching previous highlight state
    b.className='choice-btn';
    void b.offsetHeight;
  });

  S.li=0;S.t0=0;S.tgt=q.wait;
  if(S.rt)clearInterval(S.rt);

  if(isAudio){
    const audio=document.getElementById('bgm-player');
    const status=document.getElementById('audio-status');
    if(audio){
      audio.addEventListener('canplaythrough',()=>{
        if(status)status.textContent='▶ Playing BGM...';
        audio.play();
      },{once:true});
      audio.addEventListener('ended',()=>{
        if(status)status.textContent='✓ BGM done — now count to '+Math.round(q.wait/1000);
        startCountdown(q);
      },{once:true});
      audio.addEventListener('error',()=>{
        if(status)status.textContent='Audio error — timer starting now';
        startCountdown(q);
      },{once:true});
    }
  } else if(isInstant){
    // Give player 3 seconds to read the lyric before countdown starts
    setTimeout(()=>startCountdown(q), 3000);
  } else {
    S.rt=setInterval(()=>{
      const el=document.getElementById('rt');if(!el){clearInterval(S.rt);return;}
      if(S.li<=q.film.length){el.textContent=q.film.slice(0,S.li++);}
      else{
        clearInterval(S.rt);
        const c=document.getElementById('cb');if(c)c.style.display='none';
        startCountdown(q);
      }
    },g.letterMs);
  }
}

function onTap(name,btn){
  const elapsed=performance.now()-S.t0,q=S.deck[S.cur];
  const correct=name===q.correct,early=S.t0===0||elapsed<S.tgt;
  const delta=(elapsed-S.tgt)/1000,p=calcPts(correct,early,delta);
  const eS=(elapsed/1000).toFixed(1),tS=Math.round(S.tgt/1000);
  if(S.rt)clearInterval(S.rt);
  if(S.dotTimer){clearInterval(S.dotTimer);S.dotTimer=null;}
  // Stop audio if playing
  const audioEl=document.getElementById('bgm-player');if(audioEl){audioEl.pause();audioEl.currentTime=0;}
  const rt=document.getElementById('rt');if(rt)rt.textContent=q.film;
  const cb=document.getElementById('cb');if(cb)cb.style.display='none';
  const th=document.getElementById('th');if(th)th.textContent='trap: '+q.trap;
  const sc=document.getElementById('sc');if(sc)sc.style.opacity='0';
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const dot=document.getElementById('dot');if(dot)dot.style.display='none';
  S.total+=p;
  const sv=document.getElementById('sv');if(sv)sv.textContent=S.total;
  const rf=document.getElementById('rf');
  if(rf){rf.textContent=p>0?'+'+p:'0';rf.style.color=p===10?'#1d9e60':p>0?'#c07820':'#c0392b';rf.style.opacity='1';setTimeout(()=>{if(rf)rf.style.opacity='0';},1200);}
  const pip=document.getElementById('p'+S.cur);if(pip)pip.className='pip'+(early?' ep':correct?' ok':' bad');
  btn.className='choice-btn '+(early?'early':correct?'correct':'wrong');
  const fb=document.getElementById('fb');
  const detailHtml=q.detail?`<div style="margin-top:0.75rem;font-size:12px;color:var(--ink-2);line-height:1.8;background:var(--cream-2);border-left:3px solid var(--gold);padding:0.6rem 0.75rem;border-radius:0 6px 6px 0;font-style:italic">${q.detail}</div>`:'';
  if(early){fb.innerHTML='Too early — tapped at '+eS+'s, needed '+tS+'s. Forfeit. <strong>0 pts</strong><br><span style="font-size:11px;color:#aaa">Answer: '+q.correct+'</span>'+detailHtml;fb.className='feedback et';}
  else if(!correct){fb.innerHTML='Wrong — correct answer was <strong>'+q.correct+'</strong>. 0 pts'+detailHtml;fb.className='feedback bad';}
  else{const ded=Math.floor(Math.max(0,delta));let msg='Correct. Waited '+eS+'s';if(delta<=0)msg+=' — <strong>10 pts</strong>';else if(p>0)msg+=' ('+ded+'s over) — <strong>'+p+' pts</strong>';else msg+=' (too late) — <strong>0 pts</strong>';fb.innerHTML=msg+detailHtml;fb.className='feedback good';}
  S.res.push({film:q.film,correct:q.correct,target:S.tgt,elapsed,early,right:correct,delta,p,song:q.song,movie:q.movie});
  S.cur++;
  const roundDelay = q.detail ? 8000 : 2000;
  // Reset button highlight 200ms before next question to prevent bleed
  setTimeout(()=>{document.querySelectorAll('.choice-btn').forEach(b=>{b.className='choice-btn';});}, Math.max(0, roundDelay - 200));
  if(S.cur<10){
    setTimeout(()=>{renderPlay();window.scrollTo({top:0,left:0,behavior:'instant'});document.documentElement.scrollTop=0;document.body.scrollTop=0;},roundDelay);
  } else {
    trackEvent(GAMES[S.gi].id,'complete');setTimeout(()=>finishGame(),roundDelay);
  }
}

async function finishGame(){
  const[sc,at]=await Promise.all([saveScore(GAMES[S.gi].id,S.nick,S.total),getAllTimeScores(GAMES[S.gi].id)]);
  renderLB(sc,at,S.nick);S.phase='result';renderResult(sc);
}

        ${[1,2,3,4,5].map(n=>`<button data-star="${n}" style="background:none;border:none;font-size:28px;cursor:pointer;opacity:0.3;transition:opacity 0.15s;padding:0" class="star-btn">★</button>`).join('')}
      </div>
      <textarea id="fb-comment" placeholder="Any thoughts? (optional)" style="width:100%;border:1px solid #d0c8bc;border-radius:8px;padding:10px 12px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--ink-2);resize:none;height:72px;background:#fff;outline:none;box-sizing:border-box"></textarea>
      <button id="fb-submit" style="margin-top:0.75rem;width:100%;background:var(--gold);border:none;border-radius:8px;color:var(--ink-2);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;padding:10px;cursor:pointer">Submit Feedback</button>
      <div id="fb-thanks" style="display:none;text-align:center;font-size:13px;color:#1d9e60;margin-top:0.75rem;font-weight:600">Thank you for your feedback! 🙏</div>
    </div>
    ${otherGamesHtml}
    <div class="res-table"><table><thead><tr><th>Question</th><th>Target</th><th>Tapped</th><th>Pts</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
    <button class="btn-ghost" id="pa">Play again</button>`;
  document.getElementById('pa').onclick=()=>{S.phase='nick';renderNick();};

  // Feedback widget
  let selectedStars=0;
  document.getElementById('fb-toggle').onclick=()=>{
    const w=document.getElementById('fb-widget');
    w.style.display=w.style.display==='none'?'block':'none';
  };
  document.querySelectorAll('.star-btn').forEach(b=>{
    b.addEventListener('click',()=>{
      selectedStars=parseInt(b.dataset.star);
      document.querySelectorAll('.star-btn').forEach(s=>{
        s.style.opacity=parseInt(s.dataset.star)<=selectedStars?'1':'0.3';
      });
    });
    b.addEventListener('mouseover',()=>{
      const hov=parseInt(b.dataset.star);
      document.querySelectorAll('.star-btn').forEach(s=>{s.style.opacity=parseInt(s.dataset.star)<=hov?'0.8':'0.3';});
    });
    b.addEventListener('mouseout',()=>{
      document.querySelectorAll('.star-btn').forEach(s=>{s.style.opacity=parseInt(s.dataset.star)<=selectedStars?'1':'0.3';});
    });
  });
  document.getElementById('fb-submit').onclick=async()=>{
    if(!selectedStars){alert('Please select a star rating.');return;}
    const comment=document.getElementById('fb-comment').value.trim();
    try{
      await sbFetch('/rest/v1/feedback',{
        method:'POST',
        headers:{'Prefer':'return=minimal'},
        body:JSON.stringify({
          game_id:GAMES[S.gi].id,
          nick:S.nick,
          stars:selectedStars,
          comment:comment||null,
          play_date:todayDate(),
          ts:Date.now()
        })
      });
    }catch(e){}
    document.getElementById('fb-submit').style.display='none';
    document.getElementById('fb-thanks').style.display='block';
    document.querySelectorAll('.star-btn').forEach(s=>s.style.pointerEvents='none');
    document.getElementById('fb-comment').disabled=true;
  };
}

// Init
document.getElementById('btn-lobby').onclick=()=>{renderLobby();window.scrollTo({top:0,left:0,behavior:'instant'});};

const urlParams=new URLSearchParams(window.location.search);
const gameParam=urlParams.get('game');
const previewParam=urlParams.get('preview');

if(previewParam==='finish'){
  // Preview finish screen with dummy data — no need to play through
  const gi=GAMES.findIndex(g=>g.id===(gameParam||'game-001'));
  S.gi=gi>=0?gi:0;
  S.nick='Preview';
  S.total=67;
  S.res=Array(10).fill(null).map((_,i)=>({
    film:'Sample question '+(i+1),
    correct:'Answer A',
    target:5000,
    elapsed:5800,
    early:false,
    right:i%3!==2,
    delta:0.8,
    p:i%3!==2?7:0,
    song:null,
    movie:null
  }));
  renderGameView();
  finishGame();
} else if(gameParam){
  const idx=GAMES.findIndex(g=>g.id===gameParam);
  if(idx>=0){S.gi=idx;S.phase='nick';renderGameView();}
  else renderLobby();
} else {
  renderLobby();
}

// Force scroll to top after render — delayed to ensure DOM is fully painted on mobile
setTimeout(()=>{
  window.scrollTo({top:0,left:0,behavior:'instant'});
  document.documentElement.scrollTop=0;
  document.body.scrollTop=0;
},100);
requestAnimationFrame(()=>{
  window.scrollTo({top:0,left:0,behavior:'instant'});
  document.documentElement.scrollTop=0;
  document.body.scrollTop=0;
});
</script>
</body>
</html>
