  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c; --gold-light: #e8c870; --gold-dark: #8a6a20;
      --ink: #111010; --ink-2: #1a1512; --ink-3: #2a2520; --ink-4: #3a3530;
      --cream: #f5f0e8; --cream-2: #f0ebe0; --cream-3: #ece7dc;
      --muted: #8a7f72; --muted-2: #6b6258; --muted-3: #4a4540;
      --text-light: #c8bfb0;
      --green: #1d9e60; --green-bg: #edfaf3;
      --red: #c0392b; --red-bg: #fdf0ee;
      --amber: #c07820; --amber-bg: #fdf6ee;
    }
    html, body { min-height: 100vh; background: var(--ink); font-family: 'DM Sans', sans-serif; color: var(--cream); }
    #app { max-width: 960px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; background: var(--ink); }

    .logo-strip { background: var(--ink); border-bottom: 1px solid var(--ink-3); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 120px; flex-shrink: 0; }
    .logo-img { height: 100px; width: auto; object-fit: contain; }
    .logo-fallback { font-family: 'Playfair Display', serif; font-size: 24px; font-weight: 700; color: var(--gold); letter-spacing: 0.05em; }
    .tab-area { display: flex; align-items: center; gap: 0.75rem; overflow-x: auto; }
    .tab-label { font-size: 11px; letter-spacing: 0.12em; color: var(--muted-2); white-space: nowrap; text-transform: uppercase; }
    .game-tab { background: none; border: 1px solid var(--ink-4); border-radius: 6px; color: var(--muted); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 6px 14px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .game-tab:hover { border-color: var(--gold); color: var(--cream); }

    .lb-panel { background: #0d0c0a; padding: 1.5rem 1.25rem; border-left: 1px solid var(--ink-3); overflow-y: auto; }
    .lb-title { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 0.2rem; }
    .lb-date { font-size: 10px; color: var(--muted-3); margin-bottom: 1.25rem; letter-spacing: 0.03em; }

    .lb-name { flex: 1; color: var(--text-light); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .lb-score { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--gold); flex-shrink: 0; }
    .lb-row.hl { background: #1e1a10; border-radius: 6px; padding: 7px 6px; margin: 0 -6px; }

    .oco-link {

      color: var(--muted-2); text-decoration: none;

    }
    .oco-link:hover { color: var(--gold); }
    .oco-link span { color: var(--gold); }

    /* FOOTER */
    .page-footer {

      display: flex; align-items: center; justify-content: space-between;

      font-size: 12px; color: var(--muted-2);

    .footer-oco strong { color: var(--gold); font-weight: 500; }

    @media (max-width: 640px) {

    }
  </style>
</head>

<script>
const GAMES = [{
  id: 'game-001',
  name: 'Game 1',
  label: 'Tamil Cinema — Choose the right lead (Hero/Heroine) of the movies',
  goal: 'Find the correct Lead of the movie',
  answerLabel: 'WHO IS THE LEAD?',
  films: [
    { film:"Pandiya Naadu",       correct:"Vishal",           wrong:"Rajinikanth",      trap:"Pandiyan" },
    { film:"OK Kanmani",          correct:"Dulquer Salmaan",  wrong:"Udhayanidhi",      trap:"Oru Kal Oru Kannadi" },
    { film:"Vettaikkaran",        correct:"Vijay",            wrong:"Rajinikanth",      trap:"Vettaiyan" },
    { film:"Romeo Juliet",        correct:"Jayam Ravi",       wrong:"Vijay Antony",     trap:"Romeo" },
    { film:"Kana Kandaen",        correct:"Gopika",           wrong:"Aishwarya Rajesh", trap:"Kanaa" },
    { film:"Mr. Madras",          correct:"Prabhu",           wrong:"Karthi",           trap:"Madras" },
    { film:"Dhillukku Dhuddu",    correct:"Santhanam",        wrong:"Vikram",           trap:"Dhil" },
    { film:"Endrendrum Punnagai", correct:"Jiiva",            wrong:"Vijay",            trap:"Endrendrum Kaadhal" },
    { film:"Unnai Ninaithu",      correct:"Suriya",           wrong:"Ajith",            trap:"Unnai Thedi" },
    { film:"Sethupathi IPS",      correct:"Vijayakanth",      wrong:"Vijay Sethupathi", trap:"Sethupathi" },
  ]
}];

const WAITS=[2,3,4,5,6,7], LETTER_MS=300, OCO_URL='https://orucupoxygen.com';
const SUPABASE_URL='https://sispafahqsifckrnykaa.supabase.co';
const SUPABASE_KEY='sb_publishable_uu4F6F9j-2dhLtlordq8Dw_nplV6zhH';

function todayLabel(){return new Date().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
function todayDate(){const d=new Date();return d.getFullYear()+'-'+(d.getMonth()+1)+'-'+d.getDate();}
function ssh(arr,seed){let a=[...arr],s=seed;for(let i=a.length-1;i>0;i--){s=(s*1664525+1013904223)&0xffffffff;const j=Math.abs(s)%(i+1);[a[i],a[j]]=[a[j],a[i]];}return a;}
function buildDeck(g){const seed=g.id.split('').reduce((s,c)=>s+c.charCodeAt(0),0);return ssh(g.films,seed).map((f,i)=>({...f,wait:ssh([...WAITS],seed+i*7)[i%WAITS.length]*1000}));}
function calcPts(correct,early,delta){if(!correct||early)return 0;if(delta<=0)return 10;return Math.max(0,10-Math.floor(delta));}

async function sbFetch(path, opts){
  const res = await fetch(SUPABASE_URL+path, {
    ...opts,
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer '+SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts && opts.prefer ? opts.prefer : '',
      ...(opts && opts.headers ? opts.headers : {})
    }
  });
  if(!res.ok) return null;
  try { return await res.json(); } catch(e) { return []; }
}

async function getScores(gameId){
  try{
    const data = await sbFetch(
      `/rest/v1/scores?game_id=eq.${encodeURIComponent(gameId)}&play_date=eq.${todayDate()}&order=score.desc&limit=50`
    );
    return data || [];
  }catch(e){return[];}
}

async function saveScore(gameId, nick, score){
  try{
    // Check if nick already has a score today for this game
    const existing = await sbFetch(
      `/rest/v1/scores?game_id=eq.${encodeURIComponent(gameId)}&play_date=eq.${todayDate()}&nick=eq.${encodeURIComponent(nick)}&limit=1`
    );
    if(existing && existing.length > 0){
      // Only update if new score is better
      if(score > existing[0].score){
        await sbFetch(
          `/rest/v1/scores?id=eq.${existing[0].id}`,
          { method:'PATCH', body: JSON.stringify({score, ts: Date.now()}) }
        );
      }
    } else {
      // Insert new score
      await sbFetch('/rest/v1/scores', {
        method: 'POST',
        prefer: 'return=minimal',
        body: JSON.stringify({ game_id: gameId, nick, score, play_date: todayDate(), ts: Date.now() })
      });
    }
    return await getScores(gameId);
  }catch(e){return[];}}


// ── ANALYTICS ──
async function trackEvent(gameId, eventType){
  // eventType: 'attempt' | 'complete'
  try {
    await sbFetch('/rest/v1/analytics', {
      method: 'POST',
      prefer: 'return=minimal',
      body: JSON.stringify({
        game_id: gameId,
        event: eventType,
        play_date: todayDate(),
        ts: Date.now()
      })
    });
  } catch(e) { /* silent fail — never block gameplay */ }
}

function getRankMessage(rank){
  if(rank===1)return{msg:`A focused mind doesn't rush. Today, yours didn't. You're #1 on PauseMark.`,sub:`That kind of attention is what Oru Cup Oxygen is built for.`};
  if(rank<=3)return{msg:`Top 3. You paused when others clicked. You moved when it was right.`,sub:`Oru Cup Oxygen exists for minds like yours — that know the value of stillness.`};
  if(rank<=10)return{msg:`You made today's PauseMark top 10. Not by being fast — by knowing when to wait.`,sub:`That's a focused mind. Oru Cup Oxygen is built to help you stay there.`};
  return{msg:`The gap isn't knowledge — it's patience. One more breath, one more second.`,sub:`Oru Cup Oxygen has a whole stream built around exactly that.`};
}

let S={gi:0,nick:'',phase:'nick',deck:[],cur:0,total:0,res:[],rt:null,li:0,t0:0,tgt:0};

function renderTabs(){
  const w=document.getElementById('tabs');w.innerHTML='';
  GAMES.forEach((g,i)=>{const b=document.createElement('button');b.className='game-tab'+(i===S.gi?' active':'');b.textContent=g.name;b.onclick=()=>{S.gi=i;S.phase='nick';S.nick='';renderAll();};w.appendChild(b);});
}
function renderLB(scores,hl){
  document.getElementById('lbt').textContent=GAMES[S.gi].name+' — Today\'s Top 10';
  document.getElementById('lbd').textContent=todayLabel();
  const list=document.getElementById('lbl');
  if(!scores||!scores.length){list.innerHTML='<div class="lb-empty">No scores yet today.<br>Be the first.</div>';return;}
  list.innerHTML=scores.slice(0,10).map((s,i)=>{
    const rc=i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const h=s.nick===hl?' hl':'';
    const sym=i===0?'①':i===1?'②':i===2?'③':(i+1)+'';
    return`<div class="lb-row${h}"><span class="lb-rank ${rc}">${sym}</span><span class="lb-name">${s.nick}</span><span class="lb-score">${s.score}</span></div>`;
  }).join('');
}
async function refreshLB(hl){const sc=await getScores(GAMES[S.gi].id);renderLB(sc,hl||S.nick);}

function renderNick(){
  const g=GAMES[S.gi];
  document.getElementById('gp').innerHTML=`
    <div class="game-heading">${g.name}</div>
    <div class="game-label">${g.label}</div>
    <div class="rules-card">
      <div class="rules-philosophy"><strong>PauseMark</strong> is not just a quiz.<br>Most games reward the fastest finger. This one doesn't.<br>Here, the right answer at the wrong moment is worth nothing.<br>You'll learn to hold — to wait — to act only when it's time.<br>That's the mark.</div>
      <div class="rules-mechanics">Each round shows a question — revealed one letter at a time — and two options. Pick the right one.<br><br>Every round has a <strong>minimum wait time</strong> shown on screen. Tap before it and you score nothing, regardless of whether your answer is right.<br><br>Wait too long past it and you start losing points. The sweet spot is the point — not too early, not too late.</div>
      <table class="rules-table">
        <thead><tr><th>Outcome</th><th>Points</th></tr></thead>
        <tbody>
          <tr><td>Correct answer, within time</td><td class="pts-green">+10</td></tr>
          <tr><td>Wrong answer</td><td class="pts-zero">0</td></tr>
          <tr><td>Tapped before minimum wait</td><td class="pts-zero">0</td></tr>
          <tr><td>Every second over the minimum</td><td class="pts-neg">−1 / sec</td></tr>
        </tbody>
      </table>
    </div>
    <div class="field-label">Your nickname</div>
    <div class="nick-row">
      <input class="nick-input" id="ni" type="text" maxlength="20" placeholder="Any name..."/>
      <button class="btn-play" id="ng">Let's Play</button>
    </div>`;
  const inp=document.getElementById('ni');inp.focus();
  const go=()=>{const v=inp.value.trim();if(!v){inp.focus();return;}S.nick=v;S.phase='play';S.deck=buildDeck(GAMES[S.gi]);S.cur=0;S.total=0;S.res=[];trackEvent(GAMES[S.gi].id,'attempt');renderAll();};
  document.getElementById('ng').onclick=go;
  inp.onkeydown=e=>{if(e.key==='Enter')go();};
}

function renderPlay(){
  const g=GAMES[S.gi],q=S.deck[S.cur];
  let pips='';
  for(let i=0;i<10;i++){const r=S.res[i];let c='pip';if(i<S.cur)c+=r.early?' ep':r.right?' ok':' bad';else if(i===S.cur)c+=' active';pips+=`<div class="${c}" id="p${i}"></div>`;}
  const opts=ssh([q.correct,q.wrong],q.film.charCodeAt(0)+S.cur*13);
  document.getElementById('gp').innerHTML=`
    <div class="score-row"><div class="score-total"><strong id="sv">${S.total}</strong> pts</div><div class="round-flash" id="rf" style="opacity:0"></div></div>
    <div class="progress-line">${pips}</div>
    <div class="goal-line">Goal : ${g.goal}</div>
    <div class="title-wrap"><div class="title-label">${g.name}</div><div class="title-text"><span id="rt"></span><span class="cur" id="cb"></span></div></div>
    <div class="trap-hint" id="th"></div>
    <div class="wait-inst">Wait <span class="wait-num">${Math.round(q.wait/1000)}</span> seconds</div>
    <div class="answer-label">${g.answerLabel}</div>
    <div class="dot-zone"><div class="dot" id="dot"></div></div>
    <div class="choices" id="cw">${opts.map(n=>`<button class="choice-btn" data-n="${n}">${n}</button>`).join('')}</div>
    <div class="feedback" id="fb"></div>`;
  document.querySelectorAll('.choice-btn').forEach(b=>b.addEventListener('click',()=>onTap(b.dataset.n,b)));
  S.li=0;S.t0=performance.now();S.tgt=q.wait;
  if(S.rt)clearInterval(S.rt);
  S.rt=setInterval(()=>{const el=document.getElementById('rt');if(!el){clearInterval(S.rt);return;}if(S.li<=q.film.length){el.textContent=q.film.slice(0,S.li++);}else{clearInterval(S.rt);const c=document.getElementById('cb');if(c)c.style.display='none';}},LETTER_MS);
}

function onTap(name,btn){
  const elapsed=performance.now()-S.t0,q=S.deck[S.cur];
  const correct=name===q.correct,early=elapsed<S.tgt;
  const delta=(elapsed-S.tgt)/1000,p=calcPts(correct,early,delta);
  const eS=(elapsed/1000).toFixed(1),tS=Math.round(S.tgt/1000);
  if(S.rt)clearInterval(S.rt);
  const rt=document.getElementById('rt');if(rt)rt.textContent=q.film;
  const cb=document.getElementById('cb');if(cb)cb.style.display='none';
  const th=document.getElementById('th');if(th)th.textContent='trap: '+q.trap;
  document.querySelectorAll('.choice-btn').forEach(b=>b.disabled=true);
  const dot=document.getElementById('dot');if(dot)dot.style.display='none';
  S.total+=p;
  const sv=document.getElementById('sv');if(sv)sv.textContent=S.total;
  const rf=document.getElementById('rf');
  if(rf){rf.textContent=p>0?'+'+p:'0';rf.style.color=p===10?'#1d9e60':p>0?'#c07820':'#c0392b';rf.style.opacity='1';setTimeout(()=>{if(rf)rf.style.opacity='0';},1200);}
  const pip=document.getElementById('p'+S.cur);if(pip)pip.className='pip'+(early?' ep':correct?' ok':' bad');
  btn.className='choice-btn '+(early?'early':correct?'correct':'wrong');
  const fb=document.getElementById('fb');
  if(early){fb.innerHTML='Too early — tapped at '+eS+'s, needed '+tS+'s. Forfeit. <strong>0 pts</strong><br><span style="font-size:11px;color:#aaa">Answer: '+q.correct+'</span>';fb.className='feedback et';}
  else if(!correct){fb.innerHTML='Wrong — correct answer was <strong>'+q.correct+'</strong>. 0 pts';fb.className='feedback bad';}
  else{const ded=Math.floor(Math.max(0,delta));let msg='Correct. Waited '+eS+'s';if(delta<=0)msg+=' — <strong>10 pts</strong>';else if(p>0)msg+=' ('+ded+'s over) — <strong>'+p+' pts</strong>';else msg+=' (too late) — <strong>0 pts</strong>';fb.innerHTML=msg;fb.className='feedback good';}
  S.res.push({film:q.film,correct:q.correct,target:S.tgt,elapsed,early,right:correct,delta,p});
  S.cur++;
  if(S.cur<10){setTimeout(()=>renderPlay(),2000);}
  else{trackEvent(GAMES[S.gi].id,'complete');setTimeout(()=>finishGame(),2000);}
}

async function finishGame(){
  const sc=await saveScore(GAMES[S.gi].id,S.nick,S.total);
  renderLB(sc,S.nick);S.phase='result';renderResult(sc);
}

function renderResult(sc){
  const rank=sc?sc.findIndex(s=>s.nick===S.nick)+1:0;
  const correct=S.res.filter(r=>r.right).length,early=S.res.filter(r=>r.early).length;
  const inTop10=rank>=1&&rank<=10;
  const{msg,sub}=getRankMessage(rank);
  const rows=S.res.map(r=>{
    const tS=Math.round(r.target/1000),eS=(r.elapsed/1000).toFixed(1);
    const pc=r.p===10?'#1d9e60':r.p>0?'#c07820':'#c0392b';
    const st=r.early?`<span style="color:#c07820">early</span>`:r.right?`<span style="color:#1d9e60">✓</span>`:`<span style="color:#c0392b">✗</span>`;
    return`<tr><td>${r.film}</td><td style="font-family:'DM Mono',monospace;color:#8a7f72">${tS}s</td><td style="font-family:'DM Mono',monospace;color:#8a7f72">${eS}s</td><td style="font-family:'DM Mono',monospace;color:${pc};font-weight:600">${r.p}</td><td>${st}</td></tr>`;
  }).join('');
  document.getElementById('gp').innerHTML=`
    <div class="result-big">${S.total}</div>
    <div class="result-sub">out of 100 &nbsp;·&nbsp; ${correct} correct &nbsp;·&nbsp; ${early} forfeit</div>
    ${inTop10?`<div class="result-rank-num">#${rank} today</div>`:''}
    <div class="result-msg-card"><div class="result-msg-text">${msg}<br><br>${sub}</div><a class="result-msg-link" href="${OCO_URL}" target="_blank">orucupoxygen.com →</a></div>
    <div class="res-table"><table><thead><tr><th>Question</th><th>Target</th><th>Tapped</th><th>Pts</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
    <button class="btn-ghost" id="pa">Play again</button>`;
  document.getElementById('pa').onclick=()=>{S.phase='nick';renderAll();};
}

async function renderAll(){
  renderTabs();await refreshLB(S.nick);
  if(S.phase==='nick')renderNick();
  else if(S.phase==='play')renderPlay();
  else if(S.phase==='result'){const sc=await getScores(GAMES[S.gi].id);renderResult(sc);}
}
renderAll();
</script>
